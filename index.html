<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islami Ilimler - Sinava Hazirlik Uygulamasi</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:linear-gradient(135deg,#1e3a8a,#7c3aed);
text-align:center;
}

header h1{
margin:0;
font-size:22px;
}

.logo{
font-size:40px;
}

.container{
padding:16px;
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:16px;
border-radius:14px;
margin-bottom:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
}

.primary{
background:#6366f1;
color:white;
}

.secondary{
background:#334155;
color:white;
}

.question{
font-size:18px;
margin-bottom:10px;
}

.option{
background:#334155;
padding:12px;
margin:6px 0;
border-radius:10px;
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:#6366f1;
width:0%;
}

</style>
</head>

<body>

<header>
<div class="logo">☾</div>
<h1>Islami Ilimler<br>Sinava Hazirlik</h1>
</header>

<div class="container">

<div class="card">

<select id="categorySelect"></select>

<select id="bundleSize">
<option value="10">10 Fragen</option>
<option value="20">20 Fragen</option>
<option value="30">30 Fragen</option>
<option value="50">50 Fragen</option>
</select>

<button class="primary" id="startLearn">Lernen</button>
<button class="secondary" id="startExam">100 Fragen Prüfung</button>

</div>

<div class="card">

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div id="questionBox">

App bereit. Lernmodus starten.

</div>

</div>

</div>

</body>
</html>
